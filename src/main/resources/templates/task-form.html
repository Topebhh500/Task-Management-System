<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${task.id} ? 'Edit Task' : 'Create Task'"></title>
</head>
<body>
    <div layout:fragment="content">
        <h1 class="mb-4" th:text="${task.id} ? 'Edit Task' : 'Create Task'"></h1>
        <form th:action="@{/tasks}" th:object="${task}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" th:field="*{status}">
                    <option th:each="statusOpt : ${T(com.example.task_management_system.model.TaskStatus).values()}"
                            th:value="${statusOpt}" th:text="${statusOpt}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label for="dueDate" class="form-label">Due Date</label>
                <input type="datetime-local" class="form-control" id="dueDate" th:field="*{dueDate}">
            </div>
            <button type="submit" class="btn btn-primary" th:text="${task.id} ? 'Update' : 'Create'"></button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Task List</title>
</head>
<body>
    <div layout:fragment="content">
        <h1 class="mb-4">Task List</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Due Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.title}"></td>
                    <td th:text="${task.status}"></td>
                    <td th:text="${#temporals.format(task.dueDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-sm btn-info">View</a>
                        <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-warning">Edit</a>
                        <a th:href="@{/tasks/{id}/delete(id=${task.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure you want to delete this task?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
